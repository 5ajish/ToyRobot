uiDevLoadAlwaysFiles:
  - docs/architecture/ui-coding-standards.md
  - docs/architecture/ui-tech-stack.md
  - docs/architecture/ui-source-tree.md
  - docs/architecture/component-patterns.md
  - docs/architecture/theme-tokens.md
uiDevFolder: null
devStoryLocation: docs/stories
devStoryPattern: story-{n}.{n}.{n}*.md
agentCoreDump: .ai/core-dump{n}.md
