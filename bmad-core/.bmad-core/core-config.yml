markdownExploder: true
projectBrief:
  projectBriefFile: docs/project-brief.md
prd:
  prdFile: docs/prd.md
  prdVersion: v4
  prdSharded: true
  prdShardedLocation: docs/prd
  epicFilePattern: epic-{n}*.md
  featureFilePattern: feature-{n}.{n}*.md
architecture:
